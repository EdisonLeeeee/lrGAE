task: link_prediction
method: CCA-SSG
data_root: ~/public_data/pyg_data
supported_datasets:
- Cora
- Citeseer
- Pubmed
base_config:
  seed: 2024
  device: 0
  epochs: 500
  eval_steps: 50
  layer: gcn
  encoder_layers: 2
  encoder_channels: 256
  encoder_dropout: 0.5
  encoder_norm: none
  optimizer: adam
  weight_decay: 1.0e-05
  encoder_activation: prelu
  lambda_decorr: 0.001
  edge_drop_rate_1: 0.2
  edge_drop_rate_2: 0.2
  feat_drop_rate_1: 0.3
  feat_drop_rate_2: 0.3
  lr: 0.001
