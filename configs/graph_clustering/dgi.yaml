task: graph_clustering
method: DGI
data_root: ~/public_data/pyg_data
supported_datasets:
- Cora
- Citeseer
- Pubmed
- Photo
- Computers
- CS
- Physics
base_config:
  seed: 2024
  device: 0
  epochs: 500
  eval_steps: 50
  mode: last
  l2_normalize: false
  layer: gcn
  encoder_layers: 2
  encoder_channels: 512
  encoder_dropout: 0.5
  encoder_norm: none
  optimizer: adam
  weight_decay: 1.0e-05
  encoder_activation: prelu
  summary_readout: mean
  corruption: feature_shuffling
  lr: 0.001
