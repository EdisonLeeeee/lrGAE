task: graph_clustering
method: EPAGCL
data_root: ~/public_data/pyg_data
supported_datasets:
- Cora
- Citeseer
- Pubmed
- Photo
- Computers
- CS
- Physics
base_config:
  seed: 2024
  device: 0
  epochs: 500
  eval_steps: 50
  mode: last
  l2_normalize: false
  layer: gcn
  encoder_layers: 2
  encoder_channels: 256
  encoder_dropout: 0.5
  encoder_norm: none
  optimizer: adam
  weight_decay: 1.0e-05
  encoder_activation: prelu
  adaptive_edge_perturbation: true
  edge_drop_rate_1: 0.2
  edge_drop_rate_2: 0.4
  feat_drop_rate_1: 0.2
  feat_drop_rate_2: 0.3
  tau: 0.4
  lr: 0.001
